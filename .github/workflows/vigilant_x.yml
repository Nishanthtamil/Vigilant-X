name: Vigilant-X Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: ["**"]

concurrency:
  group: vigilant-x-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  vigilant-review:
    name: Vigilant-X Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      neo4j:
        image: neo4j:5.19-community
        env:
          NEO4J_AUTH: neo4j/vigilant_local
          NEO4J_PLUGINS: '["apoc"]'
          NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
        ports:
          - 7687:7687
        options: >-
          --health-cmd "cypher-shell -u neo4j -p vigilant_local 'RETURN 1'"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 5

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history needed for incremental CPG diff

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Vigilant-X
        run: pip install -e ".[dev]"

      - name: Pull/Build sandbox image
        run: docker pull ubuntu:24.04  # base layer cache warm-up

      - name: Run Vigilant-X
        env:
          LLM_PROVIDER: groq
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: meta-llama/llama-4-scout-17b-16e-instruct
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          USE_LOCAL_NEO4J: "true"
          NEO4J_LOCAL_URI: bolt://localhost:7687
          NEO4J_LOCAL_USERNAME: neo4j
          NEO4J_LOCAL_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
          SANDBOX_IMAGE: vigilant-x-sandbox:latest
          Z3_MEMORY_LIMIT_MB: "2048"
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python -m vigilant.cli review \
            --repo . \
            --pr-number "$PR_NUMBER" \
            --base-sha "$PR_BASE_SHA" \
            --head-sha "$PR_HEAD_SHA"

      - name: Upload SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: vigilant-results.sarif
          category: vigilant-x
"$PR_HEAD_SHA"
