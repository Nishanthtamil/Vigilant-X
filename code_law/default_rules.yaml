# ─────────────────────────────────────────────────────────────────────────────
# Vigilant-X — Default Code Law Rules
#
# Severity levels:
#   CRITICAL  — Must pass Z3 solver + Sandbox verification before reporting.
#               These are real security/memory-safety bugs.
#   ADVISORY  — LLM-only review. Style / modernization hints.
#               Sandbox is NOT invoked for these — avoids overwork.
# ─────────────────────────────────────────────────────────────────────────────

rules:
  # ── CRITICAL: Memory Safety ────────────────────────────────────────────────
  - id: no_raw_malloc_free
    severity: CRITICAL
    description: "Raw malloc/free usage detected. Prefer RAII containers or smart pointers."
    pattern: "call:malloc|call:free|call:calloc|call:realloc"
    applies_to: ["**/*.cpp", "**/*.cc", "**/*.c", "**/*.h", "**/*.hpp"]

  - id: no_unbounded_memcpy
    severity: CRITICAL
    description: "memcpy/memset without explicit bounds check. Potential heap buffer overflow."
    pattern: "call:memcpy|call:memset|call:memmove"
    applies_to: ["**/*.cpp", "**/*.cc", "**/*.c"]

  - id: no_raw_pointers_auth
    severity: CRITICAL
    description: "Raw pointer usage in /auth module is prohibited. Use std::unique_ptr or std::shared_ptr."
    pattern: "type:RawPointer"
    applies_to: ["**/auth/**/*.cpp", "**/auth/**/*.h", "**/auth/**/*.hpp"]

  - id: no_strcpy_strcat
    severity: CRITICAL
    description: "strcpy/strcat are unsafe. Use std::string or strlcpy with explicit size."
    pattern: "call:strcpy|call:strcat|call:sprintf|call:gets"
    applies_to: ["**/*.cpp", "**/*.cc", "**/*.c"]

  - id: use_after_free_check
    severity: CRITICAL
    description: "Pointer used after potential free/delete path detected in PDG."
    pattern: "pdg:use_after_free"
    applies_to: ["**/*.cpp", "**/*.cc"]

  - id: double_free_check
    severity: CRITICAL
    description: "Double-free detected along control flow path."
    pattern: "pdg:double_free"
    applies_to: ["**/*.cpp", "**/*.cc"]

  - id: uninitialized_read
    severity: CRITICAL
    description: "Read from potentially uninitialized variable reaching a sink."
    pattern: "pdg:uninit_read"
    applies_to: ["**/*.cpp", "**/*.cc", "**/*.c"]

  # ── CRITICAL: COM / Windows Safety ─────────────────────────────────────────
  - id: bstr_leak_on_overwrite
    severity: CRITICAL
    description: "BSTR potential leak: Variable allocated via SysAllocString is overwritten or passed by address to an allocating sink (CopyTo/Attach) without being freed."
    pattern: "call:SysAllocString|call:CopyTo|call:Attach"
    applies_to: ["**/*.cpp", "**/*.h"]

  - id: com_bstr_pattern_review
    severity: ADVISORY
    description: "Complex COM/BSTR usage detected. LLM review required for potential leaks in pass-by-address scenarios."
    pattern: "type:BSTR|type:CComBSTR"
    applies_to: ["**/*.cpp", "**/*.h"]

  # ── ADVISORY: Modernization ────────────────────────────────────────────────
  - id: prefer_string_view
    severity: ADVISORY
    description: "Prefer std::string_view over const std::string& for read-only string parameters (C++17+)."
    pattern: "param:const_string_ref"
    applies_to: ["**/*.cpp", "**/*.h", "**/*.hpp"]

  - id: prefer_span
    severity: ADVISORY
    description: "Prefer std::span over raw pointer + size pair parameters (C++20+)."
    pattern: "param:ptr_size_pair"
    applies_to: ["**/*.cpp", "**/*.h", "**/*.hpp"]

  - id: prefer_unique_ptr
    severity: ADVISORY
    description: "Prefer std::unique_ptr / std::make_unique over new/delete (C++14+)."
    pattern: "call:new|call:delete"
    applies_to: ["**/*.cpp", "**/*.cc"]

  - id: prefer_expected
    severity: ADVISORY
    description: "Prefer std::expected<T,E> over exception-heavy or raw bool return codes (C++23+)."
    pattern: "return:bool_error_code"
    applies_to: ["**/*.cpp", "**/*.h", "**/*.hpp"]

  - id: avoid_c_style_casts
    severity: ADVISORY
    description: "C-style cast detected. Use static_cast / reinterpret_cast / const_cast explicitly."
    pattern: "cast:c_style"
    applies_to: ["**/*.cpp", "**/*.cc"]

  # ── Python Security ────────────────────────────────────────────────────────
  - id: python_command_injection
    severity: CRITICAL
    description: "Insecure os.system or subprocess.run with user-controlled input."
    pattern: "call:os.system|call:subprocess.run"
    applies_to: ["**/*.py"]

  # ── JavaScript / TypeScript Security ──────────────────────────────────────
  - id: js_eval_injection
    severity: CRITICAL
    description: "eval() with non-literal argument. Potential remote code execution."
    pattern: "call:eval"
    applies_to: ["**/*.js", "**/*.jsx", "**/*.ts", "**/*.tsx", "**/*.mjs"]

  - id: js_command_injection
    severity: CRITICAL
    description: "child_process.exec or execSync with user-controlled input."
    pattern: "call:exec|call:execSync|call:spawn|call:spawnSync"
    applies_to: ["**/*.js", "**/*.jsx", "**/*.ts", "**/*.tsx"]

  - id: js_prototype_pollution
    severity: CRITICAL
    description: "Assignment to __proto__ or constructor.prototype detected."
    pattern: "assign:__proto__|assign:constructor.prototype"
    applies_to: ["**/*.js", "**/*.jsx", "**/*.ts", "**/*.tsx"]

  - id: js_path_traversal
    severity: CRITICAL
    description: "fs.readFile/writeFile with user-controlled path. Potential path traversal."
    pattern: "call:readFile|call:writeFile|call:readFileSync|call:writeFileSync"
    applies_to: ["**/*.js", "**/*.jsx", "**/*.ts", "**/*.tsx"]

  - id: js_sql_injection
    severity: CRITICAL
    description: "Raw SQL query construction with string concatenation or template literals."
    pattern: "call:query|call:execute|call:raw"
    applies_to: ["**/*.js", "**/*.jsx", "**/*.ts", "**/*.tsx"]

  - id: js_insecure_deserialization
    severity: CRITICAL
    description: "deserialize() or JSON.parse() on user-controlled input without schema validation."
    pattern: "call:deserialize|call:unserialize"
    applies_to: ["**/*.js", "**/*.jsx", "**/*.ts", "**/*.tsx"]

  - id: js_no_console_log_secrets
    severity: ADVISORY
    description: "console.log may leak sensitive data in production. Use a structured logger."
    pattern: "call:console.log|call:console.error|call:console.warn"
    applies_to: ["**/*.js", "**/*.jsx", "**/*.ts", "**/*.tsx"]

  - id: ts_any_type_usage
    severity: ADVISORY
    description: "TypeScript 'any' type disables type checking. Use 'unknown' and narrow explicitly."
    pattern: "type:any"
    applies_to: ["**/*.ts", "**/*.tsx"]

  # ── Python Framework Security ─────────────────────────────────────────────
  - id: python_sql_injection
    severity: CRITICAL
    description: "String-based SQL query construction. Use parameterized queries."
    pattern: "call:execute|call:executemany|call:raw|call:RawSQL"
    applies_to: ["**/*.py"]

  - id: python_deserialization
    severity: CRITICAL
    description: "Unsafe deserialization via pickle or yaml.load without Loader."
    pattern: "call:pickle.loads|call:pickle.load|call:yaml.load|call:marshal.loads"
    applies_to: ["**/*.py"]

  - id: python_path_traversal
    severity: CRITICAL
    description: "File path construction with user input. Potential path traversal."
    pattern: "call:open|call:Path"
    applies_to: ["**/*.py"]

  - id: python_ssrf
    severity: CRITICAL
    description: "HTTP request with user-controlled URL. Potential SSRF."
    pattern: "call:requests.get|call:requests.post|call:urllib.request.urlopen"
    applies_to: ["**/*.py"]

  - id: python_hardcoded_secret
    severity: CRITICAL
    description: "Potential hardcoded password, secret key, or API token."
    pattern: "assign:password|assign:secret|assign:api_key|assign:token"
    applies_to: ["**/*.py"]

  - id: django_orm_injection
    severity: CRITICAL
    description: "Django ORM raw() or extra(where=) with user input. Use parameterized ORM methods."
    pattern: "call:raw|call:extra|call:RawSQL|call:from_db"
    applies_to: ["**/models.py", "**/views.py", "**/*.py"]

  - id: django_xss_render
    severity: CRITICAL
    description: "render_to_string or render with user-controlled template name."
    pattern: "call:render_to_string|call:mark_safe"
    applies_to: ["**/*.py"]

  - id: flask_template_injection
    severity: CRITICAL
    description: "render_template_string() with user input enables SSTI."
    pattern: "call:render_template_string"
    applies_to: ["**/*.py"]

  - id: python_weak_crypto
    severity: CRITICAL
    description: "Weak cryptographic algorithm (MD5, SHA1) for security-sensitive operations."
    pattern: "call:md5|call:sha1|call:hashlib.md5|call:hashlib.sha1"
    applies_to: ["**/*.py"]

  # ── Go Security ───────────────────────────────────────────────────────────
  - id: go_sql_injection
    severity: CRITICAL
    description: "SQL query construction with string formatting. Use db.Query with placeholders."
    pattern: "call:Sprintf|call:fmt.Sprintf"
    applies_to: ["**/*.go"]

  - id: go_command_injection
    severity: CRITICAL
    description: "exec.Command with user-controlled arguments."
    pattern: "call:exec.Command|call:exec.CommandContext"
    applies_to: ["**/*.go"]

  - id: go_tls_insecure
    severity: CRITICAL
    description: "InsecureSkipVerify=true disables TLS certificate verification."
    pattern: "assign:InsecureSkipVerify"
    applies_to: ["**/*.go"]

  - id: go_integer_overflow
    severity: CRITICAL
    description: "Explicit integer type conversion may overflow. Check value ranges."
    pattern: "cast:int32|cast:int16|cast:uint32|cast:uint16"
    applies_to: ["**/*.go"]

  # ── Java Security ─────────────────────────────────────────────────────────
  - id: java_sql_injection
    severity: CRITICAL
    description: "Statement.execute() with string concatenation. Use PreparedStatement."
    pattern: "call:execute|call:executeQuery|call:executeUpdate"
    applies_to: ["**/*.java"]

  - id: java_deserialization
    severity: CRITICAL
    description: "ObjectInputStream.readObject() deserializes untrusted data."
    pattern: "call:readObject|call:readUnshared"
    applies_to: ["**/*.java"]

  - id: java_xxe
    severity: CRITICAL
    description: "XML parser without XXE protection. Disable external entities."
    pattern: "call:DocumentBuilderFactory|call:SAXParserFactory|call:XMLInputFactory"
    applies_to: ["**/*.java"]

  - id: java_path_traversal
    severity: CRITICAL
    description: "File construction with user input. Validate and canonicalize paths."
    pattern: "call:new File|call:Paths.get|call:FileInputStream"
    applies_to: ["**/*.java"]

  # ── Ruby Security ─────────────────────────────────────────────────────────
  - id: ruby_command_injection
    severity: CRITICAL
    description: "Shell command execution with user input via system(), exec(), or backticks."
    pattern: "call:system|call:exec|call:popen|call:spawn"
    applies_to: ["**/*.rb"]

  - id: ruby_sql_injection
    severity: CRITICAL
    description: "ActiveRecord query with string interpolation. Use parameterized queries."
    pattern: "call:where|call:find_by_sql|call:execute"
    applies_to: ["**/*.rb"]

  - id: ruby_unsafe_deserialization
    severity: CRITICAL
    description: "Marshal.load() on untrusted data enables remote code execution."
    pattern: "call:Marshal.load|call:Marshal.restore"
    applies_to: ["**/*.rb"]

  - id: ruby_open_redirect
    severity: CRITICAL
    description: "Redirect with user-controlled URL. Validate redirect target."
    pattern: "call:redirect_to"
    applies_to: ["**/*.rb", "**/*.erb"]

